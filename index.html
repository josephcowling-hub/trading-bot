<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Price Test</title>
<style>
    body { font-family: 'Courier New', monospace; background:#080c10; color:#d0dae6; padding:20px; text-align:center; }
    .card { background:#0d1117; border:1px solid #1c2530; border-radius:12px; padding:25px; margin:20px 0; }
    input { width:100%; padding:15px; margin:10px 0; background:#131923; border:1px solid #1c2530; color:white; font-size:16px; }
    button { background:#00ff88; color:black; border:none; padding:15px 30px; font-size:17px; font-weight:bold; margin:10px; width:100%; }
    .success { color:#00ff88; }
    .error { color:#ff4d4d; }
</style>
</head>
<body>

<h2>PREDICT AND EXECUTE</h2>
<p style="color:#ffd700">Live Price Test</p>

<div class="card">
    <strong>Finnhub API Key</strong><br><br>
    <input type="text" id="apiKey" placeholder="Paste key here" value="">
    <br><br>
    <button onclick="testKey()">SAVE & TEST KEY</button>
</div>

<div class="card">
    <div id="status">Waiting for key...</div>
</div>

<script>
document.getElementById("apiKey").value = localStorage.getItem("finnhubKey") || "";

async function testKey() {
    const key = document.getElementById("apiKey").value.trim();
    const status = document.getElementById("status");

    if (!key) {
        status.innerHTML = '<span class="error">❌ Please paste your key</span>';
        return;
    }

    localStorage.setItem("finnhubKey", key);
    status.innerHTML = '🔄 Testing connection...';

    try {
        const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=NVDA&token=${key}`);
        status.innerHTML = `Status: ${response.status}`;

        const data = await response.json();
        
        if (data.c) {
            status.innerHTML = `<span class="success">✅ SUCCESS!<br>NVDA = $${data.c.toFixed(2)}</span>`;
        } else {
            status.innerHTML = `<span class="error">Key accepted but no data</span>`;
        }
    } catch (err) {
        status.innerHTML = `<span class="error">Connection failed<br>${err.message}</span>`;
    }
}
</script>

</body>
</html>
