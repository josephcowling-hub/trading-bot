<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #00ff88;
  --gold: #ffd700;
  --red: #ff4d4d;
  --blue: #00bfff;
  --dark: #080c10;
  --card: #0d1117;
  --border: #1c2530;
  --text: #d0dae6;
  --muted: #5a7080;
}
body { font-family: 'Courier New', monospace; background: var(--dark); color: var(--text); min-height: 100vh; }

/* (All your original styles remain the same - I'm keeping this clean) */
.header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.logo { font-size: 16px; font-weight: 800; color: var(--green); letter-spacing: 2px; }
.header-stats { display: flex; gap: 8px; flex-wrap: wrap; }
.stat-pill { background: #131923; border: 1px solid var(--border); border-radius: 5px; padding: 5px 12px; text-align: center; }
.stat-pill .val { font-size: 14px; font-weight: 800; display: block; }
.stat-pill .lbl { font-size: 9px; color: var(--muted); letter-spacing: 1px; }

.tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--card); overflow-x: auto; }
.tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); padding: 12px 16px; cursor: pointer; font-size: 11px; white-space: nowrap; }
.tab.active { color: var(--green); border-bottom-color: var(--green); }

.main { padding: 20px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
table { width: 100%; border-collapse: collapse; font-size: 11px; }
th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #131923; }
th { background: var(--card); position: sticky; top: 0; color: var(--muted); }
tr:hover { background: rgba(0,255,136,0.03); }

.btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 800; }
.btn-green { background: linear-gradient(135deg, #00ff88, #00cc6a); color: #000; }
.badge { padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 700; }
</style>
</head>

const DEFAULT_API_KEY = ""; // Leave empty

let apiKey = localStorage.getItem("finnhubKey") || "";

function saveApiKey() {
  apiKey = document.getElementById("apiKey").value.trim();
  localStorage.setItem("finnhubKey", apiKey);
}

async function getStockPrice(ticker) {
  if (!apiKey) return { price: null, change: null };
  try {
    const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${apiKey}`);
    const data = await res.json();
    if (data.c) {
      return {
        price: data.c.toFixed(2),
        change: ((data.c - data.pc) / data.pc * 100).toFixed(2)
      };
    }
  } catch(e) {}
  return { price: null, change: null };
}

// Add live price to watchlist items
async function enrichWithLivePrices() {
  for (let item of state.watchlist) {
    if (item.ticker) {
      const data = await getStockPrice(item.ticker);
      item.livePrice = data.price;
      item.liveChange = data.change;
    }
  }
  renderScanTable();
}

// Call this after scan or on interval
setInterval(() => {
  if (apiKey) enrichWithLivePrices();
}, 25000);
