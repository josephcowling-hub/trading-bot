let apiKey = localStorage.getItem("finnhubKey") || "";

function saveKey() {
  apiKey = document.getElementById("apiKey").value.trim();
  localStorage.setItem("finnhubKey", apiKey);
  document.getElementById("keyStatus").textContent = "✅ Saved";
}

async function getLivePrice(ticker) {
  if (!apiKey || !ticker) return {price: null, change: null};
  try {
    const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${apiKey}`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (data.c > 0) {
      const change = ((data.c - data.pc) / data.pc * 100).toFixed(2);
      return { price: data.c.toFixed(2), change };
    }
  } catch(e) {}
  return { price: "N/A", change: null };
}
