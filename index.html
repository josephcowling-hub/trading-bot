<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predict and Execute - LIVE</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
        font-family: 'Courier New', monospace; 
        background: #080c10; 
        color: #d0dae6; 
        min-height: 100vh;
    }
    .header { 
        background: #0d1117; 
        padding: 15px 20px; 
        display: flex; 
        justify-content: space-between; 
        border-bottom: 1px solid #1c2530;
    }
    .logo { font-size: 18px; font-weight: 800; color: #00ff88; }
    .key-bar { 
        padding: 12px 20px; 
        background: #0a0e14; 
        border-bottom: 1px solid #1c2530; 
        display: flex; 
        align-items: center; 
        gap: 12px; 
        flex-wrap: wrap;
    }
    input { 
        flex: 1; 
        min-width: 280px; 
        padding: 10px; 
        background: #131923; 
        border: 1px solid #1c2530; 
        color: white; 
        font-family: inherit;
    }
    .btn-green { 
        background: #00ff88; 
        color: black; 
        border: none; 
        padding: 10px 18px; 
        font-weight: 800; 
        cursor: pointer;
    }
    .card { background: #0d1117; border: 1px solid #1c2530; border-radius: 10px; padding: 16px; margin: 20px; }
</style>
</head>
<body>

<div class="header">
    <div class="logo">PREDICT AND EXECUTE <span style="font-size:13px;">v2.1 LIVE</span></div>
</div>

<!-- FINNHUB KEY INPUT - THIS SHOULD ALWAYS SHOW -->
<div class="key-bar">

    <input type="text" id="apiKey" placeholder="Paste your Finnhub key here" />
    <button onclick="saveAndTestKey()" class="btn-green">Save & Test Key</button>
    <span id="keyStatus" style="margin-left:10px;"></span>
</div>

<div class="card" style="margin:20px;">
    <h2>Status</h2>
    <p id="statusText">Waiting for API key...</p>
    <button onclick="testPrice()" style="margin-top:10px;" class="btn-green">Test NVDA Price</button>
</div>

}
