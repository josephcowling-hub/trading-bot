<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predict & Execute - LIVE</title>
<style>
    body { 
        font-family: 'Courier New', monospace; 
        background: #080c10; 
        color: #d0dae6; 
        padding: 20px; 
        text-align: center;
    }
    .card { 
        background: #0d1117; 
        border: 1px solid #1c2530; 
        border-radius: 12px; 
        padding: 20px; 
        margin: 15px 0;
    }
    input { 
        width: 100%; 
        padding: 15px; 
        margin: 10px 0; 
        background: #131923; 
        border: 1px solid #1c2530; 
        color: white; 
        font-size: 16px;
    }
    button { 
        background: #00ff88; 
        color: black; 
        border: none; 
        padding: 15px 25px; 
        font-size: 16px; 
        font-weight: bold; 
        margin: 10px;
    }
    .success { color: #00ff88; }
    .error { color: #ff4d4d; }
</style>
</head>
<body>

<h2>PREDICT AND EXECUTE</h2>
<p style="color:#ffd700">v2.1 LIVE PRICE TEST</p>

<div class="card">
    <h3>Finnhub API Key</h3>
    <input type="text" id="apiKey" placeholder="Paste your Finnhub key" />
    <br><br>
    <button onclick="testKey()">TEST KEY & LOAD PRICE</button>
    <div id="status" style="margin-top:15px; font-size:15px; min-height:60px;"></div>
</div>

<div class="card">
    <h3>Result</h3>
    <div id="result" style="font-size:18px; font-weight:bold;"></div>
</div>

<script>
let apiKey = localStorage.getItem("finnhubKey") || "";

document.getElementById("apiKey").value = apiKey;

async function testKey() {
    const key = document.getElementById("apiKey").value.trim();
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");

    if (!key) {
        statusEl.innerHTML = '<span class="error">❌ Please paste a key first</span>';
        return;
    }

    localStorage.setItem("finnhubKey", key);
    statusEl.innerHTML = 'Testing key...';

    try {
        const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=NVDA&token=${key}`);
        
        if (!res.ok) {
            statusEl.innerHTML = `<span class="error">❌ HTTP Error ${res.status}</span>`;
            return;
        }

        const data = await res.json();
        
        if (data.c && data.c > 0) {
            statusEl.innerHTML = `<span class="success">✅ KEY WORKS!</span>`;
            resultEl.innerHTML = `NVDA Live Price: <span style="color:#ffd700">$${data.c.toFixed(2)}</span>`;
        } else {
            statusEl.innerHTML = `<span class="error">❌ Key valid but no data returned</span>`;
        }
    } catch(e) {
        statusEl.innerHTML = `<span class="error">❌ Connection Error<br>${e.message}</span>`;
    }
}

// Auto test if key already saved
if (apiKey) {
    setTimeout(() => testKey(), 800);
}
</script>

</body>
</html>
